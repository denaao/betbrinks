version: '3.8'

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: betbrinks-api
    restart: always
    ports:
      - '3000:3000'
    env_file:
      - ../.env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - betbrinks-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  postgres:
    image: postgres:16-alpine
    container_name: betbrinks-postgres
    restart: always
    environment:
      POSTGRES_DB: betbrinks
      POSTGRES_USER: ${DB_USER:-betbrinks}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U betbrinks']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - betbrinks-net

  redis:
    image: redis:7-alpine
    container_name: betbrinks-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - betbrinks-net

  backoffice:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backoffice
    container_name: betbrinks-backoffice
    restart: always
    ports:
      - '3001:3000'
    environment:
      - NEXT_PUBLIC_API_URL=https://api.betbrinks.com
    networks:
      - betbrinks-net

  # Reverse proxy (optional - for SSL termination)
  # nginx:
  #   image: nginx:alpine
  #   ports:
  #     - '80:80'
  #     - '443:443'
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf
  #     - /etc/letsencrypt:/etc/letsencrypt
  #   depends_on:
  #     - api
  #     - backoffice
  #   networks:
  #     - betbrinks-net

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  betbrinks-net:
    driver: bridge
