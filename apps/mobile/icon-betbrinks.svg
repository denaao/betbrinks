<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="ibg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5A8A68"/>
      <stop offset="100%" stop-color="#3D6B4E"/>
    </linearGradient>
    <linearGradient id="ig" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFDE59"/>
      <stop offset="100%" stop-color="#F5C518"/>
    </linearGradient>
    <linearGradient id="igd" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8B30E"/>
      <stop offset="100%" stop-color="#C99A08"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#1a3a24" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#ibg)"/>

  <!-- Crown - larger, centered -->
  <g transform="translate(256, 210)" filter="sh">
    <path d="M -140 55 L -140 -20 L -84 18 L -42 -62 L 0 -14 L 42 -62 L 84 18 L 140 -20 L 140 55 Z"
          fill="url(#ig)" stroke="#D4A000" stroke-width="1.5"/>
    <rect x="-140" y="55" width="280" height="32" rx="4" fill="url(#igd)" stroke="#B8910A" stroke-width="1"/>

    <!-- Gems on band -->
    <path d="M 0 65 L 9 73 L 0 81 L -9 73 Z" fill="#fff" opacity="0.9"/>
    <path d="M -58 65 L -49 73 L -58 81 L -67 73 Z" fill="#fff" opacity="0.7"/>
    <path d="M 58 65 L 67 73 L 58 81 L 49 73 Z" fill="#fff" opacity="0.7"/>

    <!-- Tip orbs -->
    <circle cx="-42" cy="-67" r="9" fill="#fff" opacity="0.9"/>
    <circle cx="0" cy="-20" r="11" fill="#fff" opacity="0.9"/>
    <circle cx="42" cy="-67" r="9" fill="#fff" opacity="0.9"/>

    <!-- Highlight -->
    <path d="M -128 50 L -128 -8 L -80 22 L -42 -50 L 0 -5 L 42 -50 L 80 22 L 128 -8 L 128 50 Z"
          fill="rgba(255,255,255,0.1)"/>
  </g>

  <!-- "BB" text -->
  <text x="256" y="370" text-anchor="middle" font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-size="80" font-weight="900" fill="#fff" letter-spacing="6">
    B<tspan fill="#FFDE59">B</tspan>
  </text>

  <!-- Small tagline -->
  <text x="256" y="410" text-anchor="middle" font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-size="22" font-weight="600" fill="rgba(255,255,255,0.45)" letter-spacing="5">
    BETBRINKS
  </text>
</svg>