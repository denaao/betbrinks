<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5A8A68"/>
      <stop offset="100%" stop-color="#3D6B4E"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFDE59"/>
      <stop offset="100%" stop-color="#F5C518"/>
    </linearGradient>
    <linearGradient id="goldDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8B30E"/>
      <stop offset="100%" stop-color="#C99A08"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1a3a24" flood-opacity="0.3"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="600" rx="120" fill="url(#bg)"/>

  <!-- Subtle pattern overlay -->
  <rect width="600" height="600" rx="120" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- Crown group - centered -->
  <g transform="translate(300, 235)" filter="shadow">
    <!-- Crown main body -->
    <path d="M -120 45 L -120 -15 L -72 15 L -36 -50 L 0 -10 L 36 -50 L 72 15 L 120 -15 L 120 45 Z"
          fill="url(#gold)" stroke="#D4A000" stroke-width="1.5"/>

    <!-- Crown base band -->
    <rect x="-120" y="45" width="240" height="28" rx="3" fill="url(#goldDark)" stroke="#B8910A" stroke-width="1"/>

    <!-- Crown gems - center diamond -->
    <path d="M 0 55 L 8 62 L 0 69 L -8 62 Z" fill="#fff" opacity="0.9"/>
    <!-- Crown gems - left diamond -->
    <path d="M -50 55 L -42 62 L -50 69 L -58 62 Z" fill="#fff" opacity="0.7"/>
    <!-- Crown gems - right diamond -->
    <path d="M 50 55 L 58 62 L 50 69 L 42 62 Z" fill="#fff" opacity="0.7"/>

    <!-- Crown tip orbs -->
    <circle cx="-36" cy="-55" r="8" fill="#fff" opacity="0.9"/>
    <circle cx="0" cy="-16" r="9" fill="#fff" opacity="0.9"/>
    <circle cx="36" cy="-55" r="8" fill="#fff" opacity="0.9"/>

    <!-- Subtle crown highlight -->
    <path d="M -110 40 L -110 -5 L -70 18 L -36 -40 L 0 -2 L 36 -40 L 70 18 L 110 -5 L 110 40 Z"
          fill="rgba(255,255,255,0.12)"/>
  </g>

  <!-- App name -->
  <text x="300" y="380" text-anchor="middle" font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-size="72" font-weight="800" fill="#fff" letter-spacing="-1">
    Bet<tspan fill="#FFDE59">Brinks</tspan>
  </text>

  <!-- Tagline -->
  <text x="300" y="420" text-anchor="middle" font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-size="20" font-weight="600" fill="rgba(255,255,255,0.5)" letter-spacing="6">
    REI DOS PALPITES
  </text>

  <!-- Bottom accent line -->
  <rect x="220" y="440" width="160" height="2" rx="1" fill="#FFDE59" opacity="0.3"/>
</svg>