<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BetBrinks - Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

  :root {
    --primary: #5B9A8B; --primary-50: #F0F7F5; --primary-100: #DCEEEa;
    --primary-200: #C2E0D9; --primary-500: #6BA89C; --primary-600: #4E8A7B;
    --primary-700: #5B9A8B; --primary-800: #3D7568;
    --accent: #E07A5F; --accent-light: #FDEEE9; --accent-dark: #C96A52;
    --bg: #F5F1EB; --card: #FFFFFF;
    --text: #2D3436; --text-sec: #7B8794; --text-light: #A4AEB8;
    --border: #E8E3DC; --border-light: #F0ECE6;
    --success: #5B9A8B; --success-bg: #F0F7F5;
    --error: #E07A5F; --error-bg: #FDEEE9;
    --warning: #E2B866; --warning-bg: #FDF6E8;
    --shadow-sm: 0 1px 3px rgba(45,52,54,0.04);
    --shadow-md: 0 4px 12px rgba(45,52,54,0.06);
    --shadow-lg: 0 8px 30px rgba(45,52,54,0.08);
    --radius: 16px; --radius-sm: 12px; --radius-xs: 8px;
  }

  body {
    font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
    background: #E8E3DC; display: flex; justify-content: center;
    align-items: center; min-height: 100vh; padding: 20px;
  }

  .phone {
    width: 390px; height: 844px; background: var(--bg);
    border-radius: 48px; overflow: hidden;
    box-shadow: 0 0 0 3px #C2B9AD, 0 30px 80px rgba(0,0,0,0.25);
    position: relative; display: flex; flex-direction: column;
  }

  .status-bar {
    height: 54px; padding: 14px 28px 0; display: flex;
    justify-content: space-between; align-items: center;
    position: relative; z-index: 20; flex-shrink: 0;
  }
  .status-bar.dark { background: var(--primary); }
  .status-bar.light { background: var(--bg); }
  .status-time { font-size: 15px; font-weight: 700; }
  .status-icons { display: flex; gap: 4px; align-items: center; font-size: 12px; }
  .dynamic-island {
    width: 126px; height: 36px; background: #2D3436;
    border-radius: 20px; position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
  }

  .screen { display: none; flex-direction: column; flex: 1; overflow: hidden; }
  .screen.active { display: flex; }

  /* ===== LOGIN ===== */
  .login-screen { background: var(--bg); }
  .login-content { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 0 28px; }
  .login-brand { text-align: center; margin-bottom: 40px; }
  .login-brand h1 {
    font-size: 34px; font-weight: 800; color: var(--primary);
    letter-spacing: -1.5px;
  }
  .login-brand p { font-size: 14px; color: var(--text-sec); margin-top: 6px; }

  .form-card {
    background: var(--card); border-radius: 20px; padding: 28px 24px;
    box-shadow: var(--shadow-md);
  }

  .field { margin-bottom: 18px; }
  .field label { display: block; font-size: 12px; font-weight: 600; color: var(--text-sec); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
  .field input {
    width: 100%; height: 52px; border: 1.5px solid var(--border);
    border-radius: var(--radius-sm); padding: 0 16px; font-size: 15px;
    color: var(--text); background: var(--bg); font-family: inherit;
    outline: none; transition: all 0.2s;
  }
  .field input:focus { border-color: var(--primary-500); background: white; box-shadow: 0 0 0 3px var(--primary-100); }

  .btn {
    width: 100%; height: 54px; border: none; border-radius: var(--radius-sm);
    font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit;
    transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-primary {
    background: var(--primary); color: white;
    box-shadow: 0 4px 14px rgba(91,154,139,0.3);
  }
  .btn-primary:hover { background: var(--primary-600); transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled { opacity: 0.5; transform: none; }
  .btn-green { background: var(--primary); color: white; box-shadow: 0 4px 14px rgba(91,154,139,0.3); }

  .login-footer { text-align: center; margin-top: 20px; font-size: 14px; color: var(--text-sec); }
  .login-footer a { color: var(--primary); font-weight: 700; text-decoration: none; }

  /* ===== APP HEADER ===== */
  .app-header {
    background: var(--primary); padding: 0 24px 20px;
    border-radius: 0 0 28px 28px; position: relative;
  }
  .header-row { display: flex; justify-content: space-between; align-items: center; padding-top: 4px; }
  .greeting { font-size: 22px; font-weight: 800; color: white; }
  .header-sub { font-size: 13px; color: rgba(255,255,255,0.6); margin-top: 2px; }
  .header-avatar {
    width: 40px; height: 40px; border-radius: 50%;
    background: rgba(255,255,255,0.2); display: flex; align-items: center;
    justify-content: center; font-size: 16px; font-weight: 700; color: white;
    border: 2px solid rgba(255,255,255,0.3);
  }

  .balance-row {
    display: flex; gap: 10px; margin-top: 16px;
  }
  .balance-chip {
    flex: 1; background: rgba(255,255,255,0.12); backdrop-filter: blur(10px);
    border-radius: var(--radius-sm); padding: 12px 14px;
    display: flex; align-items: center; gap: 8px;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .balance-chip .bc-icon { font-size: 20px; }
  .balance-chip .bc-val { font-size: 18px; font-weight: 800; color: white; }
  .balance-chip .bc-lbl { font-size: 11px; color: rgba(255,255,255,0.5); }

  /* ===== SPORT TABS ===== */
  .sport-tabs {
    display: flex; gap: 0; padding: 0 20px; overflow-x: auto; flex-shrink: 0;
    border-bottom: 1.5px solid var(--border-light);
    -webkit-overflow-scrolling: touch; scrollbar-width: none;
  }
  .sport-tabs::-webkit-scrollbar { display: none; }
  .sport-tab {
    display: flex; align-items: center; gap: 5px; padding: 10px 16px;
    font-size: 13px; font-weight: 600; color: var(--text-light);
    border: none; background: none; cursor: pointer; white-space: nowrap;
    font-family: inherit; transition: all 0.2s; position: relative;
    border-bottom: 2px solid transparent; margin-bottom: -1.5px;
  }
  .sport-tab.active {
    color: var(--primary); border-bottom-color: var(--primary);
  }
  .sport-tab .sport-icon { font-size: 15px; }

  /* ===== FILTERS ===== */
  .filters {
    display: flex; gap: 6px; padding: 10px 20px 6px; overflow: hidden; flex-shrink: 0;
  }
  .filter-pill {
    padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;
    border: 1.5px solid var(--border); background: white; color: var(--text-sec);
    cursor: pointer; white-space: nowrap; font-family: inherit; transition: all 0.2s;
  }
  .filter-pill.active {
    background: var(--primary); color: white; border-color: var(--primary);
    box-shadow: 0 2px 8px rgba(91,154,139,0.25);
  }

  /* ===== CONTENT ===== */
  .content { flex: 1; overflow-y: auto; }
  .content-inner { padding: 8px 20px 20px; }

  .section-title {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 0 8px;
  }
  .section-title h3 { font-size: 16px; font-weight: 700; color: var(--text); }
  .section-title a { font-size: 13px; font-weight: 600; color: var(--primary); text-decoration: none; }

  /* ===== FIXTURE CARD ===== */
  .match-card {
    background: white; border-radius: var(--radius); padding: 16px;
    margin-bottom: 12px; box-shadow: var(--shadow-sm);
    border: 1px solid var(--border-light); transition: all 0.2s;
  }
  .match-card:hover { box-shadow: var(--shadow-md); }

  .match-league {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 14px;
  }
  .league-name { font-size: 11px; font-weight: 600; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.3px; }
  .match-time { font-size: 13px; font-weight: 700; color: var(--primary); }

  .live-tag {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--error-bg); padding: 4px 10px; border-radius: 20px;
  }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--error); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .live-tag span { font-size: 11px; font-weight: 800; color: var(--error); }

  .match-teams { display: flex; align-items: center; }
  .match-team { flex: 1; text-align: center; }
  .team-crest {
    width: 44px; height: 44px; border-radius: 14px; background: var(--bg);
    margin: 0 auto 6px; display: flex; align-items: center; justify-content: center;
    overflow: hidden; border: 1px solid var(--border);
  }
  .team-crest img { width: 32px; height: 32px; object-fit: contain; }
  .team-crest .tc-letter { font-size: 18px; font-weight: 800; color: var(--text-light); }
  .match-team .t-name { font-size: 12px; font-weight: 600; color: var(--text); line-height: 1.3; }

  .match-score { text-align: center; padding: 0 16px; min-width: 80px; }
  .score-num { font-size: 26px; font-weight: 800; color: var(--text); letter-spacing: 2px; }
  .score-num.live { color: var(--error); }
  .score-vs { font-size: 14px; font-weight: 700; color: var(--text-light); }
  .score-status { font-size: 10px; font-weight: 600; color: var(--text-light); margin-top: 3px; text-transform: uppercase; }

  /* ===== ODDS ===== */
  .odds-group { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border-light); }
  .odds-label { font-size: 10px; font-weight: 700; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .odds-grid { display: flex; gap: 6px; }
  .odd-chip {
    flex: 1; padding: 10px 6px; background: var(--bg); border: 1.5px solid var(--border);
    border-radius: var(--radius-xs); text-align: center; cursor: pointer; transition: all 0.15s;
  }
  .odd-chip:hover { border-color: var(--primary-500); background: var(--primary-50); }
  .odd-chip.selected { border-color: var(--primary); background: var(--primary-100); }
  .odd-chip.disabled { opacity: 0.5; cursor: default; pointer-events: none; }
  .odd-chip .oc-name { font-size: 10px; font-weight: 600; color: var(--text-sec); }
  .odd-chip .oc-val { font-size: 15px; font-weight: 800; color: var(--text); margin-top: 2px; }

  /* ===== BET SLIP ===== */
  .bet-slip {
    display: none; position: absolute; bottom: 72px; left: 0; right: 0;
    background: white; border-radius: 20px 20px 0 0; padding: 0;
    z-index: 15; box-shadow: 0 -8px 40px rgba(45,52,54,0.15);
    border: 1px solid var(--border); border-bottom: none;
    transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    transform: translateY(100%);
  }
  .bet-slip.active { display: block; transform: translateY(calc(100% - 56px)); }
  .bet-slip.active.expanded { transform: translateY(0); }

  .bs-handle {
    display: flex; align-items: center; justify-content: center; padding: 10px 0 6px;
    cursor: pointer;
  }
  .bs-handle-bar { width: 36px; height: 4px; border-radius: 2px; background: var(--border); }

  .bs-preview {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0 20px 12px; cursor: pointer;
  }
  .bs-preview-left { display: flex; align-items: center; gap: 10px; }
  .bs-preview-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--primary); flex-shrink: 0; }
  .bs-preview-text { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
  .bs-preview-odd { font-size: 14px; font-weight: 800; color: var(--primary); }

  .bs-body { padding: 0 20px 20px; }
  .bs-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .bs-head h4 { font-size: 16px; font-weight: 700; color: var(--text); }
  .bs-close { background: var(--bg); border: none; width: 32px; height: 32px; border-radius: 50%; font-size: 16px; cursor: pointer; color: var(--text-sec); display: flex; align-items: center; justify-content: center; }
  .bs-match { font-size: 13px; color: var(--text-sec); margin-bottom: 4px; }
  .bs-pick {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--primary-100); padding: 6px 14px; border-radius: 20px;
    font-size: 13px; font-weight: 700; color: var(--primary); margin-bottom: 14px;
  }
  .bs-amount { display: flex; gap: 10px; align-items: center; margin-bottom: 14px; }
  .bs-amount input {
    flex: 1; height: 48px; border: 1.5px solid var(--border);
    border-radius: var(--radius-xs); padding: 0 14px; font-size: 16px;
    font-family: inherit; outline: none; font-weight: 600;
  }
  .bs-amount input:focus { border-color: var(--primary-500); }
  .bs-return { font-size: 13px; font-weight: 700; color: var(--success); white-space: nowrap; }

  .bs-selections { max-height: 180px; overflow-y: auto; margin-bottom: 12px; }
  .bs-sel-item {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px;
    background: var(--bg); border-radius: var(--radius-xs); margin-bottom: 6px;
    position: relative;
  }
  .bs-sel-info { flex: 1; min-width: 0; }
  .bs-sel-match { font-size: 11px; color: var(--text-sec); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bs-sel-pick { font-size: 13px; font-weight: 700; color: var(--text); }
  .bs-sel-odd { font-size: 14px; font-weight: 800; color: var(--primary); white-space: nowrap; }
  .bs-sel-remove {
    width: 20px; height: 20px; border-radius: 50%; border: none; background: var(--border);
    color: var(--text-sec); font-size: 11px; cursor: pointer; display: flex;
    align-items: center; justify-content: center; flex-shrink: 0;
  }
  .bs-sel-remove:hover { background: var(--error); color: white; }

  .bs-combined {
    padding: 10px 0; margin-bottom: 10px; border-top: 1.5px dashed var(--border);
    border-bottom: 1.5px dashed var(--border);
  }
  .bs-combined-row { display: flex; justify-content: space-between; align-items: center; }
  .bs-combined-label { font-size: 13px; font-weight: 600; color: var(--text-sec); }
  .bs-combined-val { font-size: 18px; font-weight: 800; color: var(--primary); }

  .bs-summary {
    background: var(--primary-50); border-radius: var(--radius-xs); padding: 12px;
    margin-bottom: 14px;
  }
  .bs-summary-row { display: flex; justify-content: space-between; align-items: center; padding: 3px 0; font-size: 13px; }
  .bs-summary-row .bsl { color: var(--text-sec); }
  .bs-summary-row .bsv { font-weight: 700; color: var(--text); }
  .bs-summary-row .bsv.highlight { color: var(--primary); font-size: 16px; font-weight: 800; }

  /* ===== BET CARD ===== */
  .bet-card {
    background: white; border-radius: var(--radius); padding: 16px;
    margin-bottom: 10px; box-shadow: var(--shadow-sm);
    border: 1px solid var(--border-light); cursor: pointer; transition: all 0.2s;
  }
  .bet-card:hover { box-shadow: var(--shadow-md); }
  .bc-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .bc-match { font-size: 14px; font-weight: 700; color: var(--text); }
  .bc-market { font-size: 12px; color: var(--text-sec); margin-top: 2px; }
  .bc-expand { color: var(--text-light); font-size: 10px; transition: transform 0.2s; }
  .bet-card.expanded .bc-expand { transform: rotate(180deg); }
  .badge {
    display: inline-flex; padding: 4px 12px; border-radius: 20px;
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px;
  }
  .badge-pending { background: var(--warning-bg); color: #8B6914; }
  .badge-won { background: var(--success-bg); color: #3D7568; }
  .badge-lost { background: var(--error-bg); color: #B05A44; }

  .bc-bottom { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
  .bc-amount { font-size: 15px; font-weight: 800; color: var(--text); }

  .bc-detail { display: none; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border-light); }
  .bet-card.expanded .bc-detail { display: block; }

  .bc-pick-box {
    background: var(--primary-50); border: 1.5px solid var(--primary-200);
    border-radius: var(--radius-sm); padding: 14px; text-align: center; margin-bottom: 14px;
  }
  .bc-pick-label { font-size: 10px; font-weight: 700; color: var(--primary-500); text-transform: uppercase; letter-spacing: 0.5px; }
  .bc-pick-value { font-size: 22px; font-weight: 800; color: var(--primary); margin-top: 2px; }
  .bc-pick-odd { font-size: 12px; font-weight: 600; color: var(--text-sec); margin-top: 2px; }

  .bc-teams-row {
    display: flex; align-items: center; justify-content: center;
    gap: 12px; padding: 10px; margin-bottom: 12px;
    background: var(--bg); border-radius: var(--radius-xs);
  }
  .bc-teams-row .bct { text-align: center; flex: 1; }
  .bc-teams-row .bct img { width: 28px; height: 28px; object-fit: contain; }
  .bc-teams-row .bct .bct-name { font-size: 11px; font-weight: 600; color: var(--text); margin-top: 2px; }
  .bc-teams-row .bct-mid { font-size: 16px; font-weight: 800; color: var(--text); }
  .bc-teams-row .bct-vs { font-size: 13px; font-weight: 700; color: var(--text-light); }

  .detail-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; }
  .detail-row .dl { color: var(--text-sec); }
  .detail-row .dv { font-weight: 600; color: var(--text); }
  .detail-row .dv.green { color: var(--success); }

  /* ===== RANKING ===== */
  .rank-card {
    display: flex; align-items: center; gap: 14px; padding: 14px 16px;
    background: white; border-radius: var(--radius); margin-bottom: 8px;
    box-shadow: var(--shadow-sm); border: 1px solid var(--border-light);
  }
  .rank-num { font-size: 18px; font-weight: 800; width: 30px; text-align: center; }
  .rank-num.g { color: #F59E0B; } .rank-num.s { color: #9CA3AF; } .rank-num.b { color: #B45309; } .rank-num.n { color: var(--text-light); }
  .rank-av { width: 40px; height: 40px; border-radius: 50%; background: var(--primary-100); display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; color: var(--primary); }
  .rank-info { flex: 1; }
  .rank-info .ri-name { font-size: 14px; font-weight: 700; color: var(--text); }
  .rank-info .ri-stats { font-size: 11px; color: var(--text-sec); }
  .rank-pts { font-size: 16px; font-weight: 800; color: var(--primary); }

  /* ===== PROFILE ===== */
  .profile-top { text-align: center; padding: 20px 20px 16px; }
  .profile-av { width: 80px; height: 80px; border-radius: 50%; background: var(--primary-100); margin: 0 auto 12px; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 800; color: var(--primary); border: 3px solid var(--primary-200); }
  .profile-top .pt-name { font-size: 22px; font-weight: 800; color: var(--text); }
  .profile-top .pt-email { font-size: 13px; color: var(--text-sec); }

  .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 20px 16px; }
  .stat-box { background: white; border-radius: var(--radius); padding: 16px; text-align: center; box-shadow: var(--shadow-sm); border: 1px solid var(--border-light); }
  .stat-box .sb-val { font-size: 24px; font-weight: 800; color: var(--primary); }
  .stat-box .sb-lbl { font-size: 11px; font-weight: 600; color: var(--text-sec); margin-top: 2px; text-transform: uppercase; }

  .menu-row {
    display: flex; align-items: center; gap: 14px; padding: 15px 20px;
    margin: 0 20px 8px; background: white; border-radius: var(--radius-sm);
    cursor: pointer; box-shadow: var(--shadow-sm); border: 1px solid var(--border-light);
  }
  .menu-row .mr-icon { font-size: 22px; }
  .menu-row .mr-label { flex: 1; font-size: 15px; font-weight: 600; color: var(--text); }
  .menu-row .mr-arrow { color: var(--text-light); font-size: 14px; }

  /* ===== LEAGUE CARD ===== */
  .league-card {
    display: flex; align-items: center; gap: 14px; padding: 14px 16px;
    background: white; border-radius: var(--radius); margin-bottom: 8px;
    box-shadow: var(--shadow-sm); border: 1px solid var(--border-light); cursor: pointer;
  }
  .league-crest { width: 40px; height: 40px; border-radius: 12px; background: var(--bg); display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid var(--border); }
  .league-crest img { width: 28px; height: 28px; object-fit: contain; }
  .league-info { flex: 1; }
  .league-info .li-name { font-size: 14px; font-weight: 700; color: var(--text); }
  .league-info .li-count { font-size: 12px; color: var(--text-sec); }
  .league-arrow { color: var(--text-light); }

  /* ===== TAB BAR ===== */
  .tab-bar {
    display: flex; height: 72px; background: white; padding-bottom: 12px;
    border-top: 1px solid var(--border); flex-shrink: 0; z-index: 20;
  }
  .tab {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; cursor: pointer; gap: 3px;
    color: var(--text-light); font-size: 10px; font-weight: 600;
    border: none; background: none; font-family: inherit; transition: all 0.2s;
    position: relative;
  }
  .tab.active { color: var(--primary); }
  .tab.active::before {
    content: ''; position: absolute; top: -1px; left: 50%; transform: translateX(-50%);
    width: 24px; height: 3px; background: var(--primary); border-radius: 0 0 3px 3px;
  }
  .tab .tab-icon { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
  .tab .tab-icon svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

  /* ===== TOAST ===== */
  .toast {
    display: none; position: absolute; top: 62px; left: 20px; right: 20px;
    padding: 12px 16px; border-radius: var(--radius-sm); z-index: 100;
    font-size: 13px; font-weight: 600; text-align: center;
    animation: slideIn 0.3s cubic-bezier(0.4,0,0.2,1);
    box-shadow: var(--shadow-lg);
  }
  .toast.success { background: var(--success-bg); color: #065F46; display: block; border: 1px solid #A7F3D0; }
  .toast.error { background: var(--error-bg); color: #991B1B; display: block; border: 1px solid #FECACA; }
  @keyframes slideIn { from { transform: translateY(-16px); opacity:0; } }

  .spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-center { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; }
  .loading-center p { font-size:14px; color:var(--text-sec); }

  .empty { text-align: center; padding: 48px 28px; }
  .empty .em-icon { margin-bottom: 14px; display: flex; justify-content: center; }
  .empty .em-icon svg { width: 48px; height: 48px; stroke: var(--text-light); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
  .empty h3 { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .empty p { font-size: 13px; color: var(--text-sec); line-height: 1.5; }

  .home-indicator { width: 134px; height: 5px; background: var(--text); opacity: 0.15; border-radius: 3px; margin: 0 auto; position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); }
</style>
</head>
<body>

<div class="phone">
  <div id="toast" class="toast"></div>

  <!-- LOGIN -->
  <div id="loginScreen" class="screen active">
    <div class="status-bar light">
      <span class="status-time" style="color:var(--text)">9:41</span>
      <div class="dynamic-island"></div>
      <span class="status-icons" style="color:var(--text)">●●●● ▲ ■</span>
    </div>
    <div class="login-content">
      <div class="login-brand">
        <h1>betbrinks</h1>
        <p>Aposte por diversao, sem risco!</p>
      </div>
      <div class="form-card">
        <div class="field">
          <label>E-mail</label>
          <input type="email" id="loginEmail" placeholder="seu@email.com" value="teste@betbrinks.com">
        </div>
        <div class="field">
          <label>Senha</label>
          <input type="password" id="loginPassword" placeholder="Sua senha" value="teste123">
        </div>
        <button class="btn btn-primary" id="loginBtn" onclick="handleLogin()">Entrar</button>
      </div>
      <p class="login-footer">Nao tem conta? <a href="#" onclick="showToast('Cadastro em breve!','success');return false">Criar conta</a></p>
    </div>
  </div>

  <!-- LOADING -->
  <div id="loadingScreen" class="screen"><div class="loading-center"><div class="spinner"></div><p>Carregando jogos...</p></div></div>

  <!-- MAIN -->
  <div id="mainScreen" class="screen">
    <div class="status-bar dark">
      <span class="status-time" style="color:white">9:41</span>
      <div class="dynamic-island"></div>
      <span class="status-icons" style="color:white">●●●● ▲ ■</span>
    </div>
    <div class="app-header">
      <div class="header-row">
        <div>
          <div class="greeting" id="greetingText">Boa tarde!</div>
          <div class="header-sub" id="headerSub">Jogos de hoje</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <button onclick="refreshFixtures()" id="refreshBtn" style="width:34px;height:34px;border-radius:50%;border:none;background:rgba(255,255,255,0.15);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.3s" title="Atualizar jogos"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg></button>
          <div class="header-avatar" id="headerAvatar">U</div>
        </div>
      </div>
      <div class="balance-row">
        <div class="balance-chip">
          <span class="bc-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v12M6 12h12"/></svg></span>
          <div><div class="bc-val" id="userPoints">1.000</div><div class="bc-lbl">pontos</div></div>
        </div>
        <div class="balance-chip">
          <span class="bc-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></span>
          <div><div class="bc-val" id="userDiamonds">0</div><div class="bc-lbl">diamantes</div></div>
        </div>
      </div>
    </div>
    <div class="sport-tabs" id="sportTabs"></div>
    <div class="filters" id="filtersBar">
      <button class="filter-pill active" onclick="filterFix('NOT_STARTED',this)">Pré-jogo</button>
      <button class="filter-pill" onclick="filterFix('live',this)">Ao vivo</button>
      <button class="filter-pill" onclick="filterFix('FINISHED',this)">Encerrado</button>
    </div>
    <div class="content"><div class="content-inner" id="mainContent"></div></div>

    <div class="bet-slip" id="betSlip">
      <div class="bs-handle" onclick="toggleBetSlip()"><div class="bs-handle-bar"></div></div>
      <div class="bs-preview" onclick="toggleBetSlip()">
        <div class="bs-preview-left">
          <div class="bs-preview-dot"></div>
          <span class="bs-preview-text" id="bsPreviewText">1 seleção</span>
        </div>
        <span class="bs-preview-odd" id="bsPreviewOdd">@ 1.00</span>
      </div>
      <div class="bs-body">
        <div class="bs-head">
          <h4 id="bsTitle">Bilhete <span id="bsCount" style="font-size:12px;color:var(--text-sec);font-weight:500"></span></h4>
          <button class="bs-close" onclick="closeBetSlip()">✕</button>
        </div>
        <div id="bsSelections" class="bs-selections"></div>
        <div class="bs-combined">
          <div class="bs-combined-row"><span class="bs-combined-label">Odd combinada</span><span class="bs-combined-val" id="bsCombinedOdd">1.00</span></div>
        </div>
        <div class="bs-amount">
          <input type="number" id="betAmount" placeholder="Valor do bilhete" value="100" min="10" max="10000" oninput="updateReturn()">
        </div>
        <div class="bs-summary" id="bsSummary"></div>
        <button class="btn btn-green" onclick="placeBet()" id="bsConfirmBtn">Confirmar Aposta</button>
      </div>
    </div>

    <div class="tab-bar">
      <button class="tab active" onclick="switchTab('jogos',this)"><span class="tab-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><line x1="2" y1="12" x2="22" y2="12"/></svg></span>Jogos</button>
      <button class="tab" onclick="switchTab('explorar',this)"><span class="tab-icon"><svg viewBox="0 0 24 24"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg></span>Explorar</button>
      <button class="tab" onclick="switchTab('apostas',this)"><span class="tab-icon"><svg viewBox="0 0 24 24"><path d="M2 9a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v0a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2z"/><path d="M2 15a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v0a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2z"/><line x1="6" y1="7" x2="6" y2="4"/><line x1="18" y1="7" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="17"/><line x1="18" y1="20" x2="18" y2="17"/></svg></span>Apostas</button>
      <button class="tab" onclick="switchTab('ranking',this)"><span class="tab-icon"><svg viewBox="0 0 24 24"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5C6 4 6 7 6 7z"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5C18 4 18 7 18 7z"/><path d="M4 22h16"/><path d="M10 22V8a4 4 0 0 1 4 0v14"/><path d="M8 9h8l-1 13H9z"/></svg></span>Ranking</button>
      <button class="tab" onclick="switchTab('perfil',this)"><span class="tab-icon"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>Perfil</button>
    </div>
    <div class="home-indicator"></div>
  </div>
</div>

<script>
const API='http://localhost:3000';
let token=null,user=null,fixtures=[],bets=[],selections=[],curFilter='NOT_STARTED',sports=[],curSportId=null;

async function handleLogin(){
  const btn=document.getElementById('loginBtn'),em=document.getElementById('loginEmail').value,pw=document.getElementById('loginPassword').value;
  if(!em||!pw){showToast('Preencha todos os campos','error');return;}
  btn.disabled=true;btn.textContent='Entrando...';
  try{
    const r=await fetch(API+'/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:em,password:pw})});
    const j=await r.json();if(!r.ok)throw new Error(j.message||'Erro');
    token=j.data.accessToken;user=j.data.user;
    showScreen('loadingScreen');
    try{await loadSports();}catch(e){console.error('sports:',e);}
    try{await loadFixtures();}catch(e){console.error('fixtures:',e);}
    try{await loadBalance();}catch(e){console.error('balance:',e);}
    updateGreeting();showScreen('mainScreen');showToast('Bem-vindo!','success');
    // Auto-refresh fixtures every 60s to keep statuses and scores updated
    if(window._fixtureRefresh)clearInterval(window._fixtureRefresh);
    window._fixtureRefresh=setInterval(async()=>{try{await loadFixtures();}catch{}},30000);
  }catch(e){showToast(e.message,'error');showScreen('loginScreen');}finally{btn.disabled=false;btn.textContent='Entrar';}
}

async function api(path,opts={}){
  const h={'Content-Type':'application/json'};if(token)h['Authorization']='Bearer '+token;
  const ctrl=new AbortController();
  const timeout=setTimeout(()=>ctrl.abort(),10000);
  try{
    const r=await fetch(API+path,{...opts,headers:{...h,...(opts.headers||{})},signal:ctrl.signal});
    clearTimeout(timeout);
    const j=await r.json();if(!r.ok)throw new Error(j.message||'Erro');return j.data!==undefined?j.data:j;
  }catch(e){clearTimeout(timeout);throw e;}
}

async function loadSports(){
  try{
    sports=await api('/sports');
    if(!sports||!sports.length){sports=[];curSportId=null;}
    else if(!curSportId)curSportId=sports[0].id;
    renderSportTabs();
  }catch{sports=[];}
}

function renderSportTabs(){
  const c=document.getElementById('sportTabs');if(!c)return;
  if(!sports.length){c.style.display='none';return;}
  c.style.display='flex';
  c.innerHTML=sports.map(s=>{
    const active=s.id===curSportId?'active':'';
    const icon=s.icon?(s.icon.startsWith('http')?'<img src="'+s.icon+'" class="sport-icon" style="width:15px;height:15px">':'<span class="sport-icon">'+s.icon+'</span>'):'';
    return '<button class="sport-tab '+active+'" onclick="pickSport('+s.id+',this)">'+icon+s.name+'</button>';
  }).join('');
}

async function pickSport(id,el){
  curSportId=id;
  document.querySelectorAll('.sport-tab').forEach(t=>t.classList.remove('active'));
  if(el)el.classList.add('active');
  await loadFixtures();
}

async function loadFixtures(){try{const q=curSportId?'/odds/fixtures?fresh=1&sportId='+curSportId:'/odds/fixtures?fresh=1';fixtures=await api(q);}catch(e){console.error('loadFixtures error:',e);fixtures=[];}renderFixtures();}

async function refreshFixtures(){
  const btn=document.getElementById('refreshBtn');
  if(btn){btn.style.animation='spin 0.8s linear infinite';btn.disabled=true;}
  try{await loadFixtures();showToast('Jogos atualizados','success');}catch{}
  finally{if(btn){btn.style.animation='';btn.disabled=false;}}
}
async function loadBalance(){try{const b=await api('/points/balance');document.getElementById('userPoints').textContent=(b.points||1000).toLocaleString('pt-BR');document.getElementById('userDiamonds').textContent=(b.diamonds||0).toLocaleString('pt-BR');}catch{}}
async function loadBets(){
  try{
    const a=await api('/bets/slips/active'),h=await api('/bets/slips/history?limit=20');
    bets=[...(a||[]),...(h.data||h||[])];
  }catch{
    // Fallback to legacy endpoints
    try{const a=await api('/bets/active'),h=await api('/bets/history?limit=20');bets=[...(a||[]),...(h.data||h||[])];}catch{bets=[];}
  }
}

function filterFix(f,el){curFilter=f;document.querySelectorAll('.filter-pill').forEach(t=>t.classList.remove('active'));if(el)el.classList.add('active');renderFixtures();}

function renderFixtures(){
  const c=document.getElementById('mainContent'),lv=['FIRST_HALF','HALFTIME','SECOND_HALF','EXTRA_TIME','PENALTIES'];
  const now=new Date();

  // Smart status: if DB says NOT_STARTED but kickoff time has passed, treat as "started" on the frontend
  const getEffective=(f)=>{
    if(f.status==='NOT_STARTED'&&f.startAt&&new Date(f.startAt)<=now) return 'STARTED_PENDING'; // started but DB not updated yet
    return f.status;
  };

  let list=fixtures;
  if(curFilter==='NOT_STARTED') list=fixtures.filter(f=>getEffective(f)==='NOT_STARTED'); // only truly upcoming
  else if(curFilter==='live') list=fixtures.filter(f=>lv.includes(f.status)||getEffective(f)==='STARTED_PENDING'); // live + started-but-not-synced
  else if(curFilter==='FINISHED') list=fixtures.filter(f=>f.status.startsWith('FINISHED'));

  const emptyMsg={'NOT_STARTED':'Nenhum jogo disponível para apostar no momento','live':'Nenhum jogo ao vivo no momento','FINISHED':'Nenhum jogo encerrado hoje'}[curFilter]||'Nenhum jogo encontrado';
  if(!list.length){c.innerHTML='<div class="empty"><div class="em-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><line x1="2" y1="12" x2="22" y2="12"/></svg></div><h3>'+emptyMsg+'</h3></div>';return;}

  c.innerHTML=list.map(f=>{
    const eff=getEffective(f);
    const live=lv.includes(f.status)||eff==='STARTED_PENDING';
    const sched=eff==='NOT_STARTED';
    const t=f.startAt?new Date(f.startAt):null;
    const time=t?t.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',timeZone:'America/Sao_Paulo'})+' - '+t.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',timeZone:'America/Sao_Paulo',hour12:false}):'';
    const stLbl=eff==='STARTED_PENDING'?'Em andamento':({'NOT_STARTED':'Pré-jogo','FIRST_HALF':'1º Tempo','HALFTIME':'Intervalo','SECOND_HALF':'2º Tempo','EXTRA_TIME':'Prorrogação','PENALTIES':'Pênaltis','FINISHED':'Encerrado'}[f.status]||f.status);
    const hL=f.homeLogo?'<img src="'+f.homeLogo+'">':'<span class="tc-letter">'+(f.homeTeam||'?')[0]+'</span>';
    const aL=f.awayLogo?'<img src="'+f.awayLogo+'">':'<span class="tc-letter">'+(f.awayTeam||'?')[0]+'</span>';
    const sc=(f.scoreHome!=null)?'<div class="score-num '+(live?'live':'')+'">'+f.scoreHome+' - '+f.scoreAway+'</div>':'<div class="score-vs">VS</div>';

    let odds='';
    const canBet=eff==='NOT_STARTED';
    const finished=f.status==='FINISHED'||f.status==='FINISHED_AET'||f.status==='FINISHED_PEN';
    if(canBet&&f.markets&&f.markets.length){
      f.markets.forEach(m=>{
        if(!m.odds||!m.odds.length)return;
        const lb={'MATCH_WINNER':'Resultado','OVER_UNDER_25':'Gols +/- 2.5','BOTH_TEAMS_SCORE':'Ambos marcam'}[m.type]||m.type;
        odds+='<div class="odds-group"><div class="odds-label">'+lb+'</div><div class="odds-grid">';
        m.odds.forEach(o=>{const sel=selections.find(s=>s.oId===o.id)?'selected':'';odds+='<div class="odd-chip '+sel+'" data-oid="'+o.id+'" onclick="pickOdd('+f.id+','+o.id+','+o.value+',\''+esc(f.homeTeam)+' vs '+esc(f.awayTeam)+'\',\''+esc(o.name)+'\',\''+esc(lb)+'\')"><div class="oc-name">'+o.name+'</div><div class="oc-val">'+parseFloat(o.value).toFixed(2)+'</div></div>';});
        odds+='</div></div>';
      });
    }
    if(canBet&&!odds){odds='<div class="odds-group"><div class="odds-label" style="color:var(--text-light);font-style:italic;padding:8px 0">Odds indisponíveis para este jogo</div></div>';}
    if(live){odds='<div class="odds-group"><div class="odds-label" style="color:var(--warning);font-style:italic;padding:8px 0;display:flex;align-items:center;gap:6px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Jogo em andamento — apostas encerradas</div></div>';}
    if(finished){odds='<div class="odds-group"><div class="odds-label" style="color:var(--text-light);font-style:italic;padding:8px 0;display:flex;align-items:center;gap:6px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>Jogo encerrado</div></div>';}
    return '<div class="match-card"><div class="match-league"><span class="league-name">'+(f.leagueName||'')+'</span>'+(live?'<div class="live-tag"><div class="live-dot"></div><span>AO VIVO</span></div>':'<span class="match-time">'+time+'</span>')+'</div><div class="match-teams"><div class="match-team"><div class="team-crest">'+hL+'</div><div class="t-name">'+f.homeTeam+'</div></div><div class="match-score">'+sc+'<div class="score-status">'+stLbl+'</div></div><div class="match-team"><div class="team-crest">'+aL+'</div><div class="t-name">'+f.awayTeam+'</div></div></div>'+odds+'</div>';
  }).join('');
}

function esc(s){return(s||'').replace(/'/g,"\\'");}

function pickOdd(fId,oId,oVal,match,name,market){
  // Only allow betting on truly upcoming fixtures (not started by time check)
  const fx=fixtures.find(f=>f.id===fId);
  if(fx&&(fx.status!=='NOT_STARTED'||(fx.startAt&&new Date(fx.startAt)<=new Date()))){showToast('Apostas encerradas para este jogo','error');return;}
  // Toggle: if same odd already selected, remove it
  const idx=selections.findIndex(s=>s.oId===oId);
  if(idx>=0){removeSelection(idx);return;}
  // Only one selection per market per fixture (can pick from different markets of same game)
  const mIdx=selections.findIndex(s=>s.fId===fId&&s.market===market);
  if(mIdx>=0) selections.splice(mIdx,1);
  selections.push({fId,oId,oVal:parseFloat(oVal),match,name,market});
  renderSlip();
}

function removeSelection(idx){
  selections.splice(idx,1);
  if(!selections.length){closeBetSlip();return;}
  renderSlip();
}

function renderSlip(){
  syncOddHighlights();

  const combined=selections.reduce((acc,s)=>acc*s.oVal,1);
  const slip=document.getElementById('betSlip');
  slip.classList.add('active');

  // Preview bar
  const n=selections.length;
  document.getElementById('bsPreviewText').textContent=n+' seleç'+(n===1?'ão':'ões');
  document.getElementById('bsPreviewOdd').textContent='@ '+combined.toFixed(2);

  // Title
  document.getElementById('bsCount').textContent=n===1?'· Simples':'· Múltipla ('+n+')';

  // Selection list
  document.getElementById('bsSelections').innerHTML=selections.map((s,i)=>
    '<div class="bs-sel-item"><div class="bs-sel-info"><div class="bs-sel-match">'+s.match+'</div><div class="bs-sel-pick">'+s.market+': '+s.name+'</div></div><span class="bs-sel-odd">'+s.oVal.toFixed(2)+'</span><button class="bs-sel-remove" onclick="event.stopPropagation();removeSelection('+i+')">✕</button></div>'
  ).join('');

  // Combined odd
  document.getElementById('bsCombinedOdd').textContent=combined.toFixed(2);
  updateReturn();
}

function syncOddHighlights(){
  document.querySelectorAll('.odd-chip').forEach(chip=>{
    const oid=parseInt(chip.dataset.oid);
    chip.classList.toggle('selected',selections.some(s=>s.oId===oid));
  });
}

function toggleBetSlip(){document.getElementById('betSlip').classList.toggle('expanded');}
function closeBetSlip(){const s=document.getElementById('betSlip');s.classList.remove('active','expanded');selections=[];syncOddHighlights();}
function getCombinedOdd(){return selections.reduce((acc,s)=>acc*s.oVal,1);}
function updateReturn(){
  if(!selections.length)return;
  const a=parseInt(document.getElementById('betAmount').value)||0;
  const co=getCombinedOdd();
  const n=selections.length;
  const retornoPotencial=Math.floor(a*co);
  const sum=document.getElementById('bsSummary');
  sum.innerHTML='<div class="bs-summary-row"><span class="bsl">Valor do bilhete</span><span class="bsv">'+a.toLocaleString('pt-BR')+' pts</span></div>'
    +(n>1?'<div class="bs-summary-row"><span class="bsl">Seleções</span><span class="bsv">'+n+' jogos</span></div>':'')
    +'<div class="bs-summary-row"><span class="bsl">Retorno potencial</span><span class="bsv highlight">'+retornoPotencial.toLocaleString('pt-BR')+' pts</span></div>';
  document.getElementById('bsConfirmBtn').textContent=n===1?'Confirmar Aposta':'Confirmar Bilhete ('+n+' seleções)';
}

async function placeBet(){
  if(!selections.length)return;
  const amt=parseInt(document.getElementById('betAmount').value)||0;
  if(amt<10){showToast('Mínimo: 10 pontos','error');return;}
  if(amt>10000){showToast('Máximo: 10.000 pontos','error');return;}
  const n=selections.length;
  const co=getCombinedOdd();
  try{
    // Use new slip endpoint — one single ticket
    const payload={
      selections:selections.map(s=>({fixtureId:s.fId,oddId:s.oId})),
      amount:amt
    };
    await api('/bets/slip',{method:'POST',body:JSON.stringify(payload)});
    closeBetSlip();
    if(n===1) showToast('Aposta de '+amt+' pts confirmada!','success');
    else showToast('Bilhete de '+amt+' pts ('+n+' seleções) · Odd '+co.toFixed(2),'success');
    await loadBalance();
  }catch(e){showToast(e.message,'error');}
}

async function switchTab(tab,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));if(el)el.classList.add('active');
  const c=document.getElementById('mainContent'),sub=document.getElementById('headerSub'),fb=document.getElementById('filtersBar');

  if(tab==='jogos'){fb.style.display='flex';sub.textContent='Jogos de hoje';renderFixtures();}
  else if(tab==='explorar'){
    fb.style.display='none';sub.textContent='Explorar ligas';
    try{const lg=await api('/odds/leagues');
      if(!lg.length){c.innerHTML='<div class="empty"><div class="em-icon"><svg viewBox="0 0 24 24"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg></div><h3>Nenhuma liga</h3></div>';return;}
      c.innerHTML=lg.map(l=>'<div class="league-card"><div class="league-crest">'+(l.logo?'<img src="'+l.logo+'">':'<span style="font-weight:700;color:var(--text-light)">'+l.name[0]+'</span>')+'</div><div class="league-info"><div class="li-name">'+l.name+'</div><div class="li-count">'+l.fixtureCount+' jogo'+(l.fixtureCount>1?'s':'')+'</div></div><span class="league-arrow">›</span></div>').join('');
    }catch{c.innerHTML='<div class="empty"><div class="em-icon"><svg viewBox="0 0 24 24"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg></div><h3>Erro ao carregar</h3></div>';}
  }
  else if(tab==='apostas'){
    fb.style.display='none';sub.textContent='Minhas apostas';
    c.innerHTML='<div style="padding:20px;text-align:center"><div class="spinner"></div></div>';
    await loadBets();
    if(!bets.length){c.innerHTML='<div class="empty"><div class="em-icon"><svg viewBox="0 0 24 24"><path d="M2 9a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v0a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2z"/><path d="M2 15a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v0a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2z"/></svg></div><h3>Nenhuma aposta</h3><p>Faça sua primeira aposta na aba Jogos!</p></div>';return;}
    c.innerHTML=bets.map(b=>{
      // Support both slip format and legacy bet format
      const isSlip=!!b.legs;
      const st=b.status==='PENDING'?'pending':b.status==='WON'?'won':'lost';
      const stLbl={PENDING:'Pendente',WON:'Ganhou',LOST:'Perdeu'}[b.status]||b.status;
      const created=b.createdAt?new Date(b.createdAt).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'';

      if(isSlip){
        const legs=b.legs||[];
        const n=legs.length;
        const typeLabel=n===1?'Simples':'Múltipla ('+n+')';
        const co=b.combinedOdd?parseFloat(b.combinedOdd).toFixed(2):'';

        // Card header
        let title=n===1?(legs[0].fixture.homeTeam+' vs '+legs[0].fixture.awayTeam):'Bilhete '+typeLabel;
        let subtitle=n===1?((({MATCH_WINNER:'Resultado',OVER_UNDER_25:'Gols +/- 2.5',BOTH_TEAMS_SCORE:'Ambos marcam'})[legs[0].marketType]||'')+': '+legs[0].oddName+' @ '+parseFloat(legs[0].oddValue).toFixed(2)):('Odd combinada: '+co);

        // Legs detail
        let legsHtml=legs.map(l=>{
          const fix=l.fixture||{};
          const mk=({MATCH_WINNER:'Resultado',OVER_UNDER_25:'Gols +/- 2.5',BOTH_TEAMS_SCORE:'Ambos marcam'})[l.marketType]||'';
          const legSt=l.status==='WON'?'✓':l.status==='LOST'?'✗':'⏳';
          const legColor=l.status==='WON'?'var(--success)':l.status==='LOST'?'var(--error)':'var(--text-sec)';
          const hasScore=fix.scoreHome!=null;
          return '<div class="bs-sel-item" style="margin-bottom:6px"><div class="bs-sel-info"><div class="bs-sel-match">'+fix.homeTeam+' vs '+fix.awayTeam+(hasScore?' ('+fix.scoreHome+'-'+fix.scoreAway+')':'')+'</div><div class="bs-sel-pick">'+mk+': '+l.oddName+'</div></div><span class="bs-sel-odd">'+parseFloat(l.oddValue).toFixed(2)+'</span><span style="font-size:16px;color:'+legColor+'">'+legSt+'</span></div>';
        }).join('');

        return '<div class="bet-card" onclick="this.classList.toggle(\'expanded\')"><div class="bc-top"><div><div class="bc-match">'+title+'</div><div class="bc-market">'+subtitle+'</div></div><span class="bc-expand">▼</span></div><div class="bc-bottom"><span class="bc-amount">'+b.amount+' pts</span><span class="badge badge-'+st+'">'+stLbl+'</span></div><div class="bc-detail"><div style="margin-bottom:12px">'+legsHtml+'</div><div class="detail-row"><span class="dl">Tipo</span><span class="dv">'+typeLabel+'</span></div><div class="detail-row"><span class="dl">Odd combinada</span><span class="dv" style="color:var(--primary);font-weight:800">'+co+'</span></div><div class="detail-row"><span class="dl">Valor apostado</span><span class="dv">'+b.amount+' pts</span></div><div class="detail-row"><span class="dl">Retorno potencial</span><span class="dv green">'+(b.potentialReturn||0)+' pts</span></div>'+(created?'<div class="detail-row"><span class="dl">Feita em</span><span class="dv">'+created+'</span></div>':'')+'</div></div>';
      } else {
        // Legacy single bet format
        const fix=b.fixture||{};
        const match=fix.homeTeam?fix.homeTeam+' vs '+fix.awayTeam:'Jogo #'+b.fixtureId;
        const oddName=b.oddName||(b.odd?b.odd.name:'');
        const mktLabel={MATCH_WINNER:'Resultado',OVER_UNDER_25:'Gols +/- 2.5',BOTH_TEAMS_SCORE:'Ambos marcam'}[b.marketType]||'';
        const oddVal=b.oddValue?parseFloat(b.oddValue).toFixed(2):'';
        return '<div class="bet-card" onclick="this.classList.toggle(\'expanded\')"><div class="bc-top"><div><div class="bc-match">'+match+'</div><div class="bc-market">'+(mktLabel?mktLabel+': ':'')+oddName+' @ '+oddVal+'</div></div><span class="bc-expand">▼</span></div><div class="bc-bottom"><span class="bc-amount">'+b.amount+' pts</span><span class="badge badge-'+st+'">'+stLbl+'</span></div><div class="bc-detail"><div class="bc-pick-box"><div class="bc-pick-label">'+(mktLabel||'Aposta')+'</div><div class="bc-pick-value">'+oddName+'</div><div class="bc-pick-odd">Odd '+oddVal+'</div></div><div class="detail-row"><span class="dl">Valor apostado</span><span class="dv">'+b.amount+' pts</span></div><div class="detail-row"><span class="dl">Retorno potencial</span><span class="dv green">'+(b.potentialReturn||0)+' pts</span></div>'+(created?'<div class="detail-row"><span class="dl">Feita em</span><span class="dv">'+created+'</span></div>':'')+'</div></div>';
      }
    }).join('');
  }
  else if(tab==='ranking'){
    fb.style.display='none';sub.textContent='Ranking';
    c.innerHTML='<div style="padding:20px;text-align:center"><div class="spinner"></div></div>';
    try{const rk=await api('/ranking');if(!rk.length)throw 0;
      c.innerHTML=rk.map((r,i)=>{const pc=i===0?'g':i===1?'s':i===2?'b':'n';const md=i===0?'1°':i===1?'2°':i===2?'3°':'';
        return '<div class="rank-card"><div class="rank-num '+pc+'">'+(md||(i+1))+'</div><div class="rank-av">'+((r.name||'?')[0]).toUpperCase()+'</div><div class="rank-info"><div class="ri-name">'+r.name+'</div><div class="ri-stats">'+(r.totalBets||0)+' apostas · '+(r.winRate||0)+'%</div></div><div class="rank-pts">'+(r.points||0).toLocaleString('pt-BR')+'</div></div>';
      }).join('');
    }catch{
      c.innerHTML='<div class="rank-card"><div class="rank-num g">🥇</div><div class="rank-av">'+((user?.name||'U')[0]).toUpperCase()+'</div><div class="rank-info"><div class="ri-name">'+(user?.name||'Você')+'</div><div class="ri-stats">Único jogador por enquanto!</div></div><div class="rank-pts">'+document.getElementById('userPoints').textContent+'</div></div><div class="empty"><div class="em-icon"><svg viewBox="0 0 24 24"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5C6 4 6 7 6 7z"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5C18 4 18 7 18 7z"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2z"/></svg></div><p>Convide amigos para competir!</p></div>';
    }
  }
  else if(tab==='perfil'){
    fb.style.display='none';sub.textContent='Perfil';
    const pts=document.getElementById('userPoints').textContent,dia=document.getElementById('userDiamonds').textContent;
    c.innerHTML='<div class="profile-top"><div class="profile-av">'+((user?.name||'U')[0]).toUpperCase()+'</div><div class="pt-name">'+(user?.name||'Jogador')+'</div><div class="pt-email">'+(user?.email||'')+'</div></div><div class="stats-row"><div class="stat-box"><div class="sb-val">'+pts+'</div><div class="sb-lbl">Pontos</div></div><div class="stat-box"><div class="sb-val">'+dia+'</div><div class="sb-lbl">Diamantes</div></div><div class="stat-box"><div class="sb-val">'+bets.length+'</div><div class="sb-lbl">Apostas</div></div><div class="stat-box"><div class="sb-val">1</div><div class="sb-lbl">Dias ativos</div></div></div><div class="menu-row" onclick="showToast(\'Em breve!\',\'success\')"><span class="mr-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="8" width="18" height="12" rx="2"/><path d="M12 8V6a2 2 0 0 1 4 0v2"/><path d="M8 8V6a4 4 0 0 1 8 0v2"/></svg></span><span class="mr-label">Bônus diário</span><span class="mr-arrow">›</span></div><div class="menu-row" onclick="showToast(\'Em breve!\',\'success\')"><span class="mr-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></span><span class="mr-label">Loja de diamantes</span><span class="mr-arrow">›</span></div><div class="menu-row" onclick="showToast(\'Em breve!\',\'success\')"><span class="mr-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/></svg></span><span class="mr-label">Conquistas</span><span class="mr-arrow">›</span></div><div class="menu-row" onclick="handleLogout()"><span class="mr-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--error)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></span><span class="mr-label" style="color:var(--error)">Sair</span><span class="mr-arrow">›</span></div>';
  }
}

function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function updateGreeting(){const h=new Date().getHours(),g=h<12?'Bom dia':h<18?'Boa tarde':'Boa noite';document.getElementById('greetingText').textContent=g+', '+(user?.name?.split(' ')[0]||'Jogador')+'!';document.getElementById('headerAvatar').textContent=((user?.name||'U')[0]).toUpperCase();}
function handleLogout(){token=null;user=null;fixtures=[];bets=[];showScreen('loginScreen');showToast('Até logo!','success');}
function showToast(m,t){const el=document.getElementById('toast');el.className='toast '+t;el.textContent=m;setTimeout(()=>{el.className='toast';},3000);}
</script>
